name: CI

# Lint + test on every push to main and every pull request.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    # Windows matches FYPA's target platform and the platform the golden
    # regression files were generated on (Triangle meshing is deterministic
    # across machines; MKL PARDISO results can vary slightly by MKL version,
    # so if the Sandbox regression test ever mismatches here, regenerate the
    # golden — see tests/test_regression.py).
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          # Pin uv itself so CI is reproducible; bump as we adopt new uv features.
          # Matches the version range developers pick up via `winget install astral-sh.uv`.
          version: "0.11.x"
          # Cache the uv resolver download + wheel cache between runs.
          enable-cache: true

      - name: Sync dependencies (runtime + dev)
        # `uv sync` reads pyproject.toml + uv.lock, fetches Python 3.12 per
        # .python-version, creates .venv, installs runtime + dev groups.
        # The `build` group (PyInstaller) is intentionally excluded — CI
        # doesn't package, only lints and tests.
        run: uv sync

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Test (pytest)
        run: uv run pytest
